plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

dependencies {
  implementation "androidx.biometric:biometric:1.1.0"
}

group = 'expo.modules.settingsstorage'
version = '0.1.0'

android {
  namespace "expo.modules.settingsstorage"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}
